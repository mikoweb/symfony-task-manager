version: "3.9"

services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: symfony_task_manager
        volumes:
            - ./:/app
        ports:
            - "8000:8000"
        env_file:
            - .env.docker
        depends_on:
            - db

    db:
        image: mysql:8.4
        container_name: symfony_task_manager_mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: symfony_task_manager
            MYSQL_USER: symfony
            MYSQL_PASSWORD: symfony
        ports:
            - "3350:3306"
        volumes:
            - ./docker-mysql:/var/lib/mysql
